services:
  postgres:
    image: postgres:16-alpine
    container_name: montello-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: josue_montello
    ports:
      - "5432:5432"
    volumes:
      - montello_postgres_data:/var/lib/postgresql/data

volumes:
  montello_postgres_data:
